<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Ev Oyunu</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0b1020; font-family: "Segoe UI", system-ui, sans-serif; color: #f4f1ea; }
    canvas { display: block; width: 100%; height: 100%; touch-action: none; }
    #hud { position: fixed; inset: 0; pointer-events: none; z-index: 10; }
    #crosshair {
      position: absolute; left: 50%; top: 48%; width: 14px; height: 14px; margin: -7px 0 0 -7px;
      border: 2px solid rgba(255,255,255,.75); border-radius: 50%; box-shadow: 0 0 0 1px rgba(0,0,0,.35);
    }
    #prompt {
      position: absolute; left: 50%; top: 56%; transform: translateX(-50%);
      background: rgba(8,12,24,.72); border: 1px solid rgba(255,255,255,.18);
      padding: 8px 14px; border-radius: 10px; font-size: 14px; letter-spacing: .2px;
      opacity: 0; transition: opacity .15s ease;
    }
    #prompt.show { opacity: 1; }
    #status {
      position: absolute; left: 16px; top: 14px; font-size: 13px;
      background: rgba(8,12,24,.65); padding: 8px 12px; border-radius: 10px;
      border: 1px solid rgba(255,255,255,.12); line-height: 1.45;
    }
    #title-overlay {
      position: fixed; inset: 0; z-index: 30; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
      background: radial-gradient(circle at 30% 20%, #1d3557, #0b1020 55%, #05070f 100%);
      pointer-events: auto;
    }
    #title-overlay h1 {
      font-size: clamp(28px, 7vw, 54px); font-weight: 800; letter-spacing: .5px;
      text-shadow: 0 8px 30px rgba(0,0,0,.45);
    }
    #title-overlay p { max-width: 420px; text-align: center; opacity: .85; padding: 0 20px; line-height: 1.5; }
    #start-btn {
      pointer-events: auto; border: 0; cursor: pointer; color: #fff; font-weight: 700;
      font-size: 16px; padding: 14px 28px; border-radius: 999px;
      background: linear-gradient(135deg, #2d6a4f, #40916c);
      box-shadow: 0 10px 28px rgba(45,106,79,.45);
    }
    .pad {
      position: absolute; width: 126px; height: 126px; border-radius: 50%;
      background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.18);
      pointer-events: auto; touch-action: none;
    }
    #move-pad { left: 24px; bottom: 24px; }
    #look-pad { right: 24px; bottom: 24px; }
    .knob {
      position: absolute; left: 50%; top: 50%; width: 52px; height: 52px; margin: -26px 0 0 -26px;
      border-radius: 50%; background: rgba(255,255,255,.28); border: 1px solid rgba(255,255,255,.35);
    }
    #actions {
      position: absolute; right: 24px; bottom: 170px; display: flex; flex-direction: column; gap: 10px;
      pointer-events: auto;
    }
    .action-btn {
      min-width: 92px; padding: 12px 14px; border-radius: 14px; border: 1px solid rgba(255,255,255,.2);
      background: rgba(8,12,24,.72); color: #fff; font-weight: 700; font-size: 13px;
    }
    .action-btn:active { transform: scale(.96); background: rgba(45,106,79,.85); }
    #held {
      position: absolute; left: 50%; bottom: 18px; transform: translateX(-50%);
      background: rgba(8,12,24,.7); padding: 8px 12px; border-radius: 10px;
      border: 1px solid rgba(255,255,255,.14); font-size: 13px; display: none;
    }
  </style>
</head>
<body>
  <div id="title-overlay">
    <h1>Ev Oyunu</h1>
    <p>Evin içinde serbest dolaş. Kapıyı aç-kapa, televizyonu aç-kapa, eşyaları alıp istediğin yere koy.</p>
    <button id="start-btn" type="button">Oyuna Başla</button>
  </div>

  <div id="hud">
    <div id="status">Salon • Eşya: 0 elde</div>
    <div id="crosshair"></div>
    <div id="prompt"></div>
    <div id="held">Elde: —</div>
    <div id="move-pad" class="pad"><div class="knob" id="move-knob"></div></div>
    <div id="look-pad" class="pad"><div class="knob" id="look-knob"></div></div>
    <div id="actions">
      <button class="action-btn" id="btn-interact" type="button">Etkileş</button>
      <button class="action-btn" id="btn-drop" type="button">Bırak</button>
    </div>
  </div>

  <script src="three.min.js"></script>
  <script src="game.js"></script>
</body>
</html>
