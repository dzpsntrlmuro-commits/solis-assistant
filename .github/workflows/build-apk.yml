name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Fix gradlew permissions
        run: |
          chmod +x gradlew
          head -5 gradlew

      - name: Build APK
        run: |
          java -jar gradle/wrapper/gradle-wrapper.jar assembleDebug --no-daemon --stacktrace 2>&1 | tail -100

      - name: Find APK
        if: always()
        run: find . -name "*.apk" 2>/dev/null || echo "No APK found"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: solis-apk
          path: app/build/outputs/apk/debug/
          if-no-files-found: warn
          retention-days: 30
