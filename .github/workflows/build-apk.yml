name: Build APK

on:
  push:
    branches: [ main, 'cursor/**' ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - run: chmod +x gradlew

      - name: Build APK
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build-output.txt

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-output
          path: build-output.txt
          retention-days: 3

      - name: Upload APK if exists
        if: always()
        run: |
          APK=$(find . -name "*-debug.apk" 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            echo "APK found: $APK"
            cp "$APK" ./IckiSay-debug.apk
          else
            echo "No APK produced"
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ickisay-apk
          path: IckiSay-debug.apk
          if-no-files-found: warn
          retention-days: 30
