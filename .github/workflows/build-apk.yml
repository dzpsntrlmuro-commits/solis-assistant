name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK (with full output)
        run: ./gradlew assembleDebug --stacktrace --info 2>&1 | tail -n 150
        continue-on-error: true

      - name: Check build output dir
        run: |
          echo "=== Build dir contents ==="
          find app/build -type f 2>/dev/null | head -50 || echo "No build dir"
          echo "=== APK search ==="
          find . -name "*.apk" 2>/dev/null || echo "No APK"
