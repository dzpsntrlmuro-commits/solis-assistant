name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Test gradlew
        run: ./gradlew --version

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Find APK
        if: always()
        run: find . -name "*.apk" 2>/dev/null && echo "APK found!" || echo "No APK"

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: solis-assistant-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
