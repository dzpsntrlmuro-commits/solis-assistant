name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - run: chmod +x gradlew
      - name: Build
        run: |
          set -o pipefail
          ./gradlew assembleDebug --no-daemon 2>&1 | tail -200
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: apk-output
          path: |
            app/build/outputs/apk/
          if-no-files-found: warn
