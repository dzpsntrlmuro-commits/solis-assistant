name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Find and copy APK
        run: |
          echo "=== Tüm APK dosyaları ==="
          find . -name "*.apk" -type f 2>/dev/null
          echo "=== Build klasörü ==="
          find app/build -type f -name "*.apk" 2>/dev/null || echo "app/build bulunamadı"
          mkdir -p output
          find . -name "*.apk" -exec cp {} output/ \;
          ls -la output/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: solis-assistant-apk
          path: output/
          if-no-files-found: error
          retention-days: 30
